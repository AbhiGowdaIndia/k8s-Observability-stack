apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-alerts
  namespace: observability
spec:
  groups:
  - name: demo.rules
    rules:
    - alert: HighCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total[5m])) > 0.5
      for: 2m
      labels:
        severity: warning
      annotations:
        description: CPU usage is high.